name: Code Style

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - '**.stub'
      - 'composer.json'
      - '.github/workflows/fix-php-code-style-issues.yml'
  pull_request:
    paths:
      - '**.php'
      - '**.stub'
      - 'composer.json'
      - '.github/workflows/fix-php-code-style-issues.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-style-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-code-styling:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: vendor/bin/pint --test
